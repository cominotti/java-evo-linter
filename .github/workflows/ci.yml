name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and Test (JDK 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Verify
        run: mvn -B -ntp verify

      - name: Build CLI distribution
        run: mvn -B -ntp -pl linter-cli -am package

      - name: Upload CLI distribution
        uses: actions/upload-artifact@v4
        with:
          name: java-evo-linter-cli-dist
          path: |
            linter-cli/target/*-dist.zip
            linter-cli/target/*-dist.tar.gz

  example-consumer:
    name: Example Consumer Build
    runs-on: ubuntu-latest
    needs:
      - build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Install linter artifacts to local repository
        run: mvn -B -ntp -pl linter-core,linter-cli,linter-maven-plugin -am install

      - name: Build example consumer (target release 21)
        run: mvn -B -ntp -f examples/maven-plugin-consumer/pom.xml verify
