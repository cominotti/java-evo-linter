name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  license-check:
    name: License Headers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Check Apache-2.0 SPDX headers
        run: mvn -B -ntp validate

  build-test:
    name: Build and Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs:
      - license-check
    strategy:
      fail-fast: false
      matrix:
        java:
          - 21
          - 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify
        run: mvn -B -ntp verify

      - name: Build CLI distribution
        if: matrix.java == '21'
        run: mvn -B -ntp -pl linter-cli -am package

      - name: Upload CLI distribution
        if: matrix.java == '21'
        uses: actions/upload-artifact@v4
        with:
          name: java-evo-linter-cli-dist
          path: |
            linter-cli/target/*-dist.zip
            linter-cli/target/*-dist.tar.gz

  example-consumer:
    name: Example Consumer Build
    runs-on: ubuntu-latest
    needs:
      - build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install linter artifacts to local repository
        run: mvn -B -ntp -pl linter-core,linter-cli,linter-maven-plugin -am install

      - name: Build Maven plugin consumer example
        run: mvn -B -ntp -f examples/maven-plugin-consumer/pom.xml verify

      - name: Run library consumer smoke test
        run: mvn -B -ntp -f examples/library-consumer/pom.xml test
